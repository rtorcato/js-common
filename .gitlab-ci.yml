####################################################
stages:
  - dependencies
  - lint
  - test
  - build
  - release

####################################################

# Reusable cache config
.cache: &cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .pnpm-store
      - node_modules/

####################################################

default:
  image: node:20.8-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@latest --activate

####################################################

workflow:
  rules:
    # Prevent loop from semantic-release
    - if: '$CI_COMMIT_MESSAGE =~ /(\[ci skip\]|\[skip ci\])/i'
      when: never
    # Run on merge requests
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    # Run on named branches
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "release" || $CI_COMMIT_BRANCH == "ci-testing"'
      when: always

####################################################

dependencies:
  stage: dependencies
  <<: *cache
  script:
    - pnpm install --store .pnpm-store

####################################################

lint:
  stage: lint
  <<: *cache
  script:
    - pnpm lint

typecheck:
  stage: lint
  <<: *cache
  script:
    - pnpm typecheck

####################################################

test:
  stage: test
  <<: *cache
  script:
    - pnpm test

####################################################

build:
  stage: build
  <<: *cache
  script:
    - pnpm build-prod
  artifacts:
    paths:
      - dist/
      - package.json
      - README.md
      - pnpm-lock.yaml
      - .npmrc
    expire_in: 1 week

####################################################

publish:
  stage: release
  dependencies:
    - build
  <<: *cache
  variables:
    GIT_AUTHOR_NAME: 'GitLab CI'
    GIT_AUTHOR_EMAIL: 'ci@example.com'
    GIT_COMMITTER_NAME: 'GitLab CI'
    GIT_COMMITTER_EMAIL: 'ci@example.com'
  script:
    # Preflight — fail fast if release tokens are missing
    - '[ -n "$GITLAB_TOKEN" ] || { echo "GITLAB_TOKEN is not set"; exit 1; }'
    - '[ -n "$NPM_TOKEN" ] || { echo "NPM_TOKEN is not set"; exit 1; }'
    - apk add --no-cache git
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@example.com"
    - git fetch --unshallow || true
    - git pull origin main --ff-only
    - rm -f .npmrc ~/.npmrc
    - echo "@rtorcato/js-common:registry=https://gitlab.com/api/v4/projects/69645966/packages/npm/" > ~/.npmrc
    - echo "//gitlab.com/api/v4/projects/69645966/packages/npm/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
    - pnpm exec semantic-release --no-ci

####################################################
